    el.innerHTML='<div class="top"><div class="order">'+idx+'</div><div class="head">'+
      '<p class="name">'+esc(c.n)+'</p><p class="sub">'+esc(c.cat)+' &middot; '+esc(c.dir)+'</p>'+
      '<div class="badges"><span class="b '+pc+'">'+c.prio+'</span><span class="b dist">'+esc(c.dist)+'</span></div>'+
      '</div></div><p class="desc">'+esc(c.d)+'</p>'+tip+
      '<div class="actions"><a class="btn map" href="'+c.g+'" target="_blank" rel="noopener">'+PIN+'Maps</a>'+tel+'</div>'+
      '<button class="check" data-n="'+esc(c.n)+'">'+(done?"&#10003; Visitado":"Marcar visitado")+'</button>';
    list.appendChild(el);
  }
  var b=document.querySelectorAll(".check");
  for(i=0;i<b.length;i++){b[i].onclick=function(){var n=this.getAttribute("data-n");if(estado[n])delete estado[n];else estado[n]=Date.now();save();render()}}
  updateBar();
}
function updateBar(){
  var total=DATA.length,done=DATA.filter(function(c){return estado[c.n]}).length;
  document.getElementById("bar").style.width=(done/total*100)+"%";
  document.getElementById("count").textContent=done+" visitado"+(done===1?"":"s");
  document.getElementById("left").textContent=(total-done)+" por visitar";
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(estado))}catch(e){}}
document.getElementById("filters").onclick=function(e){
  var chip=e.target.closest?e.target.closest(".chip"):null;if(!chip)return;
  var ch=document.querySelectorAll(".chip"),k;for(k=0;k<ch.length;k++)ch[k].classList.remove("on");
  chip.classList.add("on");filtro=chip.getAttribute("data-f");render();
};
document.getElementById("reset").onclick=function(){
  if(confirm("¿Borrar todos los marcados?")){estado={};save();render()}
};
var ORIG="25 de Mayo 648, Vicente Lopez";
var pts=DATA.map(function(c){return encodeURIComponent(c.dir+", Vicente Lopez")});
var dest=pts[pts.length-1],way=pts.slice(0,-1).slice(0,9).join("|");
document.getElementById("routeAll").href=
 "https://www.google.com/maps/dir/?api=1&origin="+encodeURIComponent(ORIG)+
 "&destination="+dest+"&travelmode=walking&waypoints="+way;
render();
</script>
</body></html>
